name: "Android"

on: ["push", "pull_request"]

jobs:
  build:
    name: "Build Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Versions are kept in sync with rel/android/app/.tool-versions because the
    # bundled Erlang runtime in the APK is ABI-locked to a specific OTP release.
    env:
      OTP_VERSION: "26.2.5"
      ELIXIR_VERSION: "1.17.2-otp-26"
      NODE_VERSION: "22"

    steps:
    - uses: actions/checkout@v5
      with:
        # The embedded Erlang runtime and a couple of jars in rel/android/ are
        # tracked through Git LFS; without this the binaries would be checked
        # out as ~130 byte pointer files and the APK build would fail.
        lfs: true

    - name: Set up Elixir/Erlang (matching embedded runtime)
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ env.OTP_VERSION }}
        elixir-version: ${{ env.ELIXIR_VERSION }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK and CMake
      run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

    - name: Build APK
      run: scripts/build_android.sh assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: rel/android/app/build/outputs/apk/debug/app-debug.apk
